app-id: com.pokemmo.PokeMMO
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions: [org.freedesktop.Sdk.Extension.openjdk21]
separate-locales: false
command: pokemmo.sh
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=all
  - --socket=pulseaudio
  - --env=PATH=/app/jre/bin:/app/bin:/usr/bin
  - --env=__GL_THREADED_OPTIMIZATIONS=0
modules:
  - name: zenity
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/zenity/4.2/zenity-4.2.0.tar.xz
        sha512: 7458a1a7ba13ed13371117daca721d8df325f6a6c75410b1d7298448477104a066be839a4e1a96ef0579b5abfb304e98937672ac02adb8f9323e31bb55bf99bc
  - name: OpenJDK
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk21/install.sh
  - name: PokeMMO
    buildsystem: simple
    only-arches: [x86_64, aarch64]
    build-commands:
      - |
        if [ "$FLATPAK_ARCH" = "aarch64" ]; then
          install -Dm755 linux/arm64/PokeMMO-Updater /app/bin/launcher
        else
          install -Dm755 linux/x64/PokeMMO-Updater /app/bin/launcher
        fi
      - install -D pokemmo.sh /app/bin/pokemmo.sh
      - |
        for size in 16x16 22x22 24x24 32x32 48x48 64x64 128x128 256x256 512x512; do
          install -Dm644 icon_${size}.png /app/share/icons/hicolor/${size}/apps/com.pokemmo.PokeMMO.png
        done
      - |
        for size in 24x24 32x32 48x48 64x64 128x128 256x256 512x512; do
          install -Dm644 icon_settings_${size}.png /app/share/icons/hicolor/${size}/apps/com.pokemmo.PokeMMO.Settings.png
        done
      - install -Dp -m 644 com.pokemmo.PokeMMO.desktop /app/share/applications/com.pokemmo.PokeMMO.desktop
      - install -Dp -m 644 com.pokemmo.PokeMMO.Settings.desktop /app/share/applications/com.pokemmo.PokeMMO.Settings.desktop
      - install -Dm644 -t /app/share/metainfo com.pokemmo.PokeMMO.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/kyu-n/pokemmo-unix-installer/releases/download/v4.0-beta1/native-image.zip
        sha512: 9e4a7520f58c913b6d614828f01cee7629db83683fc5c5da8618ae165ca6cdb632a0cc75e41b1c577189facf60cca8d6cd4eace9ffcd11b5653e453f676f8994
        strip-components: 0
      - type: dir
        path: static
      - type: dir
        path: icons
      - type: file
        path: com.pokemmo.PokeMMO.metainfo.xml